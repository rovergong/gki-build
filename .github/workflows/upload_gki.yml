name: Download and Upload Kernel Assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      KERNEL_COMMIT: 6c9833506661b564ae3bedd6378ff80a3718e256
      RELEASE_TAG: kernel-archive-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Download and Upload Kernel
        run: |
          # 正确的 Google Source 内核下载地址
          KERNEL_URL="https://android.googource.com/kernel/common/+archive/${{ env.KERNEL_COMMIT }}.tar.gz"
          KERNEL_FILE="common-${{ env.KERNEL_COMMIT }}.tar.gz"
          
          echo "Downloading kernel commit: ${{ env.KERNEL_COMMIT }}"
          aria2c -s16 -x16 -k1M "$KERNEL_URL" -o "$KERNEL_FILE"
          
          echo "Checking/Creating release: ${{ env.RELEASE_TAG }}"
          gh release view "${{ env.RELEASE_TAG }}" &>/dev/null || \
            gh release create "${{ env.RELEASE_TAG }}" --title "Kernel Archive ${{ env.KERNEL_COMMIT }}" --notes "Automated upload of kernel source archive."
          
          echo "Uploading $KERNEL_FILE"
          gh release upload "${{ env.RELEASE_TAG }}" "$KERNEL_FILE" --clobber
